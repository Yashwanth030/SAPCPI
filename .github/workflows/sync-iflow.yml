name: Sync SAP CPI Package

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      packageId:
        description: "Enter SAP Package ID"
        required: false
        default: "Yashwanth"
        type: string

  schedule:
    - cron: '0 2 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      PACKAGE_ID: ${{ github.event.inputs.packageId || 'Yashwanth' }}

    steps:

      ####################################################
      # Checkout Repository
      ####################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Install jq
      ####################################################
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      ####################################################
      # Read Previous Sync State
      ####################################################
      - name: Read Previous Sync State
        shell: bash
        run: |

          mkdir -p sync
          mkdir -p "packages/${PACKAGE_ID}/IFlows"
          mkdir -p temp

          echo "===================================="
          echo "Checking Previous Sync State"
          echo "===================================="

          if [ -f "sync/${PACKAGE_ID}.json" ]; then

            echo "Previous Sync State Found"
            cat "sync/${PACKAGE_ID}.json"

          else

            echo "No Previous Sync State Found"

            echo "{}" > "sync/${PACKAGE_ID}.json"

          fi

      ####################################################
      # Verify Secrets
      ####################################################
      - name: Verify Secrets
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |

          echo "TOKEN_URL : ${{ secrets.TOKEN_URL }}"
          echo "CLIENT_ID Length : ${#CLIENT_ID}"

      ####################################################
      # Generate OAuth Token
      ####################################################
      - name: Generate OAuth Token
        env:
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        shell: bash
        run: |

          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -u "$CLIENT_ID:$CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then

            echo "OAuth Token Generation Failed"

            echo "$RESPONSE"

            exit 1

          fi

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      ####################################################
      # Get Package Artifacts
      ####################################################
      - name: Get Package Artifacts
        shell: bash
        run: |

          echo "===================================="
          echo "Fetching Package Artifacts"
          echo "===================================="

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "${{ secrets.BASE_URL }}/api/v1/IntegrationPackages('${PACKAGE_ID}')/IntegrationDesigntimeArtifacts")

          echo "$RESPONSE"

          echo "$RESPONSE" > temp/artifacts.json

      ####################################################
      # Extract Artifacts
      ####################################################
      - name: Extract Artifacts
        shell: bash
        run: |

          echo "===================================="
          echo "Artifacts Found"
          echo "===================================="

          jq -r '.d.results[] | "\(.Id) | Version : \(.Version)"' temp/artifacts.json

      ####################################################
      # Delta Sync Download
      ####################################################
      - name: Delta Sync Download
        shell: bash
        run: |

          echo "===================================="
          echo "Delta Synchronization Started"
          echo "===================================="

          jq -c '.d.results[]' temp/artifacts.json | while read artifact
          do

            ID=$(echo "$artifact" | jq -r '.Id')
            VERSION=$(echo "$artifact" | jq -r '.Version')
            MODIFIED=$(echo "$artifact" | jq -r '.ModifiedAt')

            OLD_MODIFIED=$(jq -r --arg id "$ID" '.[$id] // empty' "sync/${PACKAGE_ID}.json")

            echo ""
            echo "----------------------------------------"
            echo "Artifact : $ID"
            echo "Current ModifiedAt : $MODIFIED"
            echo "Previous ModifiedAt : ${OLD_MODIFIED:-Not Found}"

            if [ "$MODIFIED" = "$OLD_MODIFIED" ]; then

              echo "No Changes Detected"
              echo "Skipping Download"

            else

              echo "Changes Detected"
              echo "Downloading..."

              curl -L \
                -H "Authorization: Bearer $TOKEN" \
                "${{ secrets.BASE_URL }}/api/v1/IntegrationDesigntimeArtifacts(Id='${ID}',Version='${VERSION}')/\$value" \
                --output "packages/${PACKAGE_ID}/IFlows/${ID}.zip"

              echo "Downloaded ${ID}.zip"

            fi

          done

          echo ""
          echo "===================================="
          echo "Delta Sync Completed"
          echo "===================================="

      ####################################################
      # Create Sync State
      ####################################################
      - name: Create Sync State
        shell: bash
        run: |

          echo "===================================="
          echo "Updating Sync State"
          echo "===================================="

          jq '
            .d.results
            | map({(.Id): .ModifiedAt})
            | add
          ' temp/artifacts.json > "sync/${PACKAGE_ID}.json"

          cat "sync/${PACKAGE_ID}.json"

      ####################################################
      # Cleanup
      ####################################################
      - name: Cleanup Temporary Files
        run: |
          rm -rf temp

      ####################################################
      # Show Repository Structure
      ####################################################
      - name: Show Files
        run: |
          ls -R

      ####################################################
      # Configure Git
      ####################################################
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      ####################################################
      # Commit Changes
      ####################################################
      - name: Commit Changes
        run: |

          git add .

          if git diff --cached --quiet; then

            echo "No Changes Detected"

          else

            git commit -m "Delta Sync (${PACKAGE_ID}) - $(date -u '+%Y-%m-%d %H:%M UTC')"

          fi

      ####################################################
      # Push
      ####################################################
      - name: Push Changes
        run: |
          git push
